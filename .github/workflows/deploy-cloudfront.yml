name: Deploy static site to S3 and CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET || secrets.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing configuration: set AWS_REGION in Variables or Secrets"
            exit 1
          fi
          if [ -z "${S3_BUCKET}" ]; then
            echo "Missing configuration: set S3_BUCKET in Variables or Secrets"
            exit 1
          fi
          if [ -z "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            echo "Missing configuration: set CLOUDFRONT_DISTRIBUTION_ID in Variables or Secrets"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync . "s3://${S3_BUCKET}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload HTML files (no cache)
        run: |
          aws s3 sync . "s3://${S3_BUCKET}" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
